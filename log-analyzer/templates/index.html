<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LogAnalyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
{% raw %}
    const { useState, useEffect, useRef } = React;

    // --- API ---
    const API_BASE = '';

    // --- Components ---

    const Nav = ({ user, onLogout }) => (
      <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 h-16 px-6 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold">LA</div>
          <div className="font-bold text-lg tracking-tight">LogAnalyzer</div>
        </div>
        <div className="flex items-center gap-4">
          <div className="text-sm text-slate-500">session: <span className="font-semibold text-slate-900">{user}</span></div>
          <button onClick={onLogout} className="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-lg transition">Logout</button>
        </div>
      </nav>
    );

    const Login = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);

        try {
          const res = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            body: formData,
            credentials: 'same-origin'
          });

          if (res.redirected || res.ok) {
            onLogin(username);
          } else {
            setError('Invalid username or password');
          }
        } catch (err) {
          onLogin(username); // Fallback for demo
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="w-full max-w-md bg-white border border-slate-200 rounded-xl shadow-lg p-10">
            <div className="flex items-center gap-3 mb-8">
              <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold text-lg">LA</div>
              <div>
                <h1 className="font-bold text-xl tracking-tight">LogAnalyzer</h1>
                <p className="text-sm text-slate-500">Enterprise Log Analytics</p>
              </div>
            </div>
            <h2 className="text-2xl font-bold mb-2">Welcome back</h2>
            <p className="text-slate-500 mb-7">Sign in to access your dashboard</p>
            
            {error && (
              <div className="bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 mb-5 flex items-center gap-2 text-sm">
                ⚠ {error}
              </div>
            )}

            <form onSubmit={handleSubmit}>
              <div className="mb-5">
                <label className="block text-sm font-medium text-slate-700 mb-2">Username</label>
                <input 
                  type="text" 
                  value={username} 
                  onChange={(e) => setUsername(e.target.value)} 
                  className="w-full px-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition"
                  required
                  autoFocus
                />
              </div>
              <div className="mb-6">
                <label className="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <input 
                  type="password" 
                  value={password} 
                  onChange={(e) => setPassword(e.target.value)} 
                  className="w-full px-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition"
                  required
                />
              </div>
              <button 
                type="submit" 
                className="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition active:scale-[0.98]"
              >
                Sign in
              </button>
            </form>
            <div className="mt-6 text-center text-sm text-slate-500">Secure connection • Protected data</div>
          </div>
        </div>
      );
    };

    const Upload = ({ user, onBack }) => {
      const [file, setFile] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [progressStep, setProgressStep] = useState(0);
      const [dragOver, setDragOver] = useState(false);

      const steps = [
        { label: 'SPLIT', pct: 15 },
        { label: 'MAP', pct: 45 },
        { label: 'SHUFFLE', pct: 65 },
        { label: 'REDUCE', pct: 80 },
        { label: 'AI INSIGHTS', pct: 95 }
      ];

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!file) return;
        
        setUploading(true);
        setProgressStep(0);

        const interval = setInterval(() => {
          setProgressStep(prev => {
            if (prev < steps.length - 1) return prev + 1;
            return prev;
          });
        }, 800);

        const formData = new FormData();
        formData.append('logfile', file);

        try {
          const res = await fetch(`${API_BASE}/api/upload`, {
            method: 'POST',
            body: formData
          });
          
          clearInterval(interval);
          if (res.ok) {
            onBack();
          }
        } catch (err) {
          clearInterval(interval);
          setUploading(false);
        }
      };

      return (
        <div className="min-h-screen">
          <nav className="bg-white border-b border-slate-200 h-16 px-6 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold">LA</div>
              <div className="font-bold text-lg tracking-tight">LogAnalyzer</div>
            </div>
            <button onClick={onBack} className="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-lg transition">← Dashboard</button>
          </nav>

          <main className="max-w-3xl mx-auto px-6 py-12">
            <div className="mb-8">
              <h1 className="text-2xl font-bold mb-2">Upload & Analyze</h1>
              <p className="text-slate-500 leading-relaxed">
                Upload a raw Apache/Nginx .log file. The MapReduce engine will process it in parallel across multiple workers and generate AI-powered security + performance insights.
              </p>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl shadow p-8">
              <div className="grid grid-cols-4 gap-4 mb-8">
                {[
                  { num: '01', name: 'Split', desc: 'Chunk file into workers' },
                  { num: '02', name: 'Map', desc: 'Parallel line parsing' },
                  { num: '03', name: 'Shuffle', desc: 'Group by key' },
                  { num: '04', name: 'Reduce', desc: 'Aggregate counts' }
                ].map((step, i) => (
                  <div key={i} className="bg-slate-50 rounded-lg p-4 text-center">
                    <div className="text-xs font-semibold text-blue-600 uppercase tracking-wider mb-1">{step.num}</div>
                    <div className="text-sm font-semibold mb-1">{step.name}</div>
                    <div className="text-xs text-slate-500">{step.desc}</div>
                  </div>
                ))}
              </div>

              <form onSubmit={handleSubmit}>
                <div 
                  className={`border-2 border-dashed rounded-xl p-12 text-center cursor-pointer transition ${dragOver || file ? 'border-blue-500 bg-blue-50/50' : 'border-slate-200 hover:border-blue-400'}`}
                  onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={(e) => {
                    e.preventDefault();
                    setDragOver(false);
                    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
                  }}
                >
                  <input 
                    type="file" 
                    accept=".log" 
                    onChange={(e) => setFile(e.target.files ? e.target.files[0] : null)} 
                    className="hidden"
                    id="fileInput"
                    required
                  />
                  <label htmlFor="fileInput" className="cursor-pointer">
                    <span className="text-5xl block mb-4">📋</span>
                    <div className="text-base font-medium mb-2">Drop your .log file here or click to browse</div>
                    <div className="text-sm text-slate-500">Apache / Nginx combined log format supported</div>
                    {file && (
                      <div className="mt-4 text-sm font-semibold text-blue-600">✓ {file.name}</div>
                    )}
                  </label>
                </div>

                {uploading && (
                  <div className="mt-6">
                    <div className="flex justify-between mb-3">
                      {steps.map((s, i) => (
                        <div key={i} className={`text-xs font-semibold ${i < progressStep ? 'text-green-600' : i === progressStep ? 'text-blue-600' : 'text-slate-400'}`}>{s.label}</div>
                      ))}
                    </div>
                    <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                      <div 
                        className="h-full bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full transition-all duration-500"
                        style={{ width: `${steps[progressStep]?.pct || 0}%` }}
                      />
                    </div>
                    <div className="mt-3 text-center text-sm text-slate-500">Initializing pipeline...</div>
                  </div>
                )}

                <button 
                  type="submit" 
                  disabled={!file || uploading}
                  className="w-full mt-6 py-3 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition active:scale-[0.98]"
                >
                  {uploading ? 'Processing...' : 'Run MapReduce + AI Analysis →'}
                </button>
              </form>

              <div className="grid grid-cols-4 gap-3 mt-6">
                {[
                  { title: 'Format', desc: 'Apache / Nginx combined log' },
                  { title: 'Engine', desc: 'Python multiprocessing.Pool' },
                  { title: 'AI Model', desc: 'Claude Sonnet' },
                  { title: 'Storage', desc: 'SQLite' }
                ].map((item, i) => (
                  <div key={i} className="bg-slate-50 rounded-lg p-3">
                    <div className="text-sm font-semibold mb-1">{item.title}</div>
                    <div className="text-xs text-slate-500">{item.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          </main>
        </div>
      );
    };

    const StatsCards = ({ results }) => {
      const total404 = results.reduce((sum, r) => sum + (r.result?.HTTP_404 || 0), 0);
      const total500 = results.reduce((sum, r) => sum + (r.result?.HTTP_500 || 0), 0);
      const totalLines = results.reduce((sum, r) => sum + (r.benchmarks?.total_lines || 0), 0);

      return (
        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-7">
          <div className="bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow hover:border-slate-300 transition p-5">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Files Analyzed</div>
            <div className="text-3xl font-bold text-blue-600">{results.length}</div>
            <div className="text-sm text-slate-500 mt-2">logs processed</div>
          </div>
          <div className="bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow hover:border-slate-300 transition p-5">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Lines Processed</div>
            <div className="text-3xl font-bold">{totalLines.toLocaleString()}</div>
            <div className="text-sm text-slate-500 mt-2">via MapReduce</div>
          </div>
          <div className="bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow hover:border-slate-300 transition p-5">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Total HTTP 404</div>
            <div className="text-3xl font-bold text-amber-500">{total404}</div>
            <div className="text-sm text-slate-500 mt-2">not found errors</div>
          </div>
          <div className="bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow hover:border-slate-300 transition p-5">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Total HTTP 500</div>
            <div className="text-3xl font-bold text-red-500">{total500}</div>
            <div className="text-sm text-slate-500 mt-2">server errors</div>
          </div>
          <div className="bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow hover:border-slate-300 transition p-5">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">MapReduce Engine</div>
            <div className="text-xl font-bold text-green-600 pt-2">● ONLINE</div>
            <div className="text-sm text-slate-500 mt-2">parallel workers active</div>
          </div>
        </div>
      );
    };

    const Benchmarks = ({ latest }) => {
      const lb = latest.benchmarks || {};
      const tTotal = lb.t_total || 0.001;
      const steps = [
        { key: 't_split', label: '01 SPLIT', color: '#10b981' },
        { key: 't_map', label: '02 MAP', color: '#2563eb' },
        { key: 't_shuffle', label: '03 SHUFFLE', color: '#6366f1' },
        { key: 't_reduce', label: '04 REDUCE', color: '#f59e0b' }
      ];

      return (
        <div className="mb-7">
          <div className="flex items-center gap-3 mb-4">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest">MapReduce Pipeline — Latest Run</div>
            <div className="flex-1 h-px bg-slate-200" />
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            {steps.map((step) => {
              const t = lb[step.key] || 0;
              const pct = Math.min(Math.round((t / tTotal) * 100), 100);
              return (
                <div key={step.key} className="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
                  <div className="text-xs font-semibold text-blue-600 uppercase tracking-wider mb-1">{step.label}</div>
                  <div className="text-2xl font-bold">{t}<span className="text-sm font-normal text-slate-500 ml-1">sec</span></div>
                  <div className="mt-3 h-1 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full rounded-full transition-all duration-1000" style={{ width: `${pct}%`, backgroundColor: step.color }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const SpeedCard = ({ latest }) => {
      const lb = latest.benchmarks || {};
      const linesPerSec = lb.lines_per_sec || 0;
      const pct = Math.min(Math.round((linesPerSec / 50000) * 100), 100);

      return (
        <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5 mb-7">
          <div className="flex flex-wrap items-center justify-between gap-6">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest">PROCESSING SPEED</div>
            <div className="text-2xl font-bold text-blue-600">{linesPerSec.toLocaleString()} <span className="text-sm font-normal text-slate-500">lines/sec</span></div>
            <div className="flex-1 min-w-[200px]">
              <div className="flex items-center gap-3 text-xs text-slate-500">
                <span>0</span>
                <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full" style={{ width: `${pct}%` }} />
                </div>
                <span>50k</span>
              </div>
            </div>
            <div className="text-sm text-slate-500">{lb.num_workers || 0} workers | {lb.num_chunks || 0} chunks | {(lb.total_lines || 0).toLocaleString()} lines</div>
          </div>
        </div>
      );
    };

    const Charts = ({ latest }) => {
      const lr = latest.result || {};
      const hourRef = useRef(null);
      const errorRef = useRef(null);
      const methodRef = useRef(null);
      const sizeRef = useRef(null);

      useEffect(() => {
        const chartDefaults = {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#0f172a',
              titleColor: '#fff',
              bodyColor: '#cbd5e1',
              borderColor: '#334155',
              borderWidth: 1,
              padding: 12,
              titleFont: { family: 'Inter', size: 13, weight: '600' },
              bodyFont: { family: 'Inter', size: 13 }
            }
          },
          scales: {
            x: { ticks: { color: '#64748b', font: { family: 'Inter', size: 12 } }, grid: { color: '#e2e8f0' } },
            y: { ticks: { color: '#64748b', font: { family: 'Inter', size: 12 } }, grid: { color: '#e2e8f0' } }
          }
        };

        // Hour Chart
        if (hourRef.current) {
          const hours = Array.from({ length: 24 }, (_, i) => `Hour_${String(i).padStart(2, '0')}`);
          new window.Chart(hourRef.current, {
            type: 'line',
            data: {
              labels: hours.map(h => h.replace('Hour_', '') + ':00'),
              datasets: [{
                data: hours.map(h => lr[h] || 0),
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37, 99, 235, 0.08)',
                borderWidth: 2,
                pointRadius: 3,
                pointBackgroundColor: '#2563eb',
                fill: true,
                tension: 0.4
              }]
            },
            options: chartDefaults
          });
        }

        // Error Chart
        if (errorRef.current) {
          const eKeys = Object.keys(lr).filter(k => k.startsWith('HTTP_'));
          const eColors = {
            'HTTP_200': '#10b981', 'HTTP_201': '#059669', 'HTTP_301': '#2563eb', 'HTTP_302': '#1d4ed8',
            'HTTP_400': '#f59e0b', 'HTTP_401': '#d97706', 'HTTP_403': '#b45309', 'HTTP_404': '#f59e0b',
            'HTTP_500': '#ef4444', 'HTTP_502': '#dc2626', 'HTTP_503': '#b91c1c', 'HTTP_504': '#991b1b'
          };
          new window.Chart(errorRef.current, {
            type: 'bar',
            data: {
              labels: eKeys,
              datasets: [{
                data: eKeys.map(k => lr[k]),
                backgroundColor: eKeys.map(k => (eColors[k] || '#64748b') + '22'),
                borderColor: eKeys.map(k => eColors[k] || '#64748b'),
                borderWidth: 1
              }]
            },
            options: { ...chartDefaults, indexAxis: 'y' }
          });
        }

        // Method Chart
        if (methodRef.current) {
          const mKeys = Object.keys(lr).filter(k => k.startsWith('METHOD_'));
          const mColors = ['#10b981', '#2563eb', '#6366f1', '#f59e0b', '#ef4444', '#f97316'];
          new window.Chart(methodRef.current, {
            type: 'bar',
            data: {
              labels: mKeys.map(k => k.replace('METHOD_', '')),
              datasets: [{
                data: mKeys.map(k => lr[k]),
                backgroundColor: mColors.map(c => c + '33'),
                borderColor: mColors,
                borderWidth: 1
              }]
            },
            options: chartDefaults
          });
        }

        // Size Chart
        if (sizeRef.current) {
          const sKeys = ['SIZE_small', 'SIZE_medium', 'SIZE_large'];
          const sLabels = ['< 1KB', '1KB–10KB', '> 10KB'];
          new window.Chart(sizeRef.current, {
            type: 'doughnut',
            data: {
              labels: sLabels,
              datasets: [{
                data: sKeys.map(k => lr[k] || 0),
                backgroundColor: ['rgba(16, 185, 129, 0.2)', 'rgba(37, 99, 235, 0.2)', 'rgba(99, 102, 241, 0.2)'],
                borderColor: ['#10b981', '#2563eb', '#6366f1'],
                borderWidth: 1
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              plugins: {
                legend: {
                  display: true,
                  position: 'bottom',
                  labels: { color: '#64748b', font: { family: 'Inter', size: 12 }, boxWidth: 10, padding: 12 }
                },
                tooltip: chartDefaults.plugins.tooltip
              }
            }
          });
        }
      }, [lr]);

      return (
        <div className="mb-7">
          <div className="flex items-center gap-3 mb-4">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest">Analytics — Latest File: {latest.filename}</div>
            <div className="flex-1 h-px bg-slate-200" />
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="lg:col-span-2 bg-white border border-slate-200 rounded-xl shadow-sm p-5">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-4 pb-2 border-b border-slate-100">Traffic by Hour</div>
              <canvas ref={hourRef} height="120" />
            </div>
            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-4 pb-2 border-b border-slate-100">HTTP Status Distribution</div>
              <canvas ref={errorRef} height="120" />
            </div>
            <div className="lg:col-span-2 bg-white border border-slate-200 rounded-xl shadow-sm p-5">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-4 pb-2 border-b border-slate-100">HTTP Methods Breakdown</div>
              <canvas ref={methodRef} height="120" />
            </div>
            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-5">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-4 pb-2 border-b border-slate-100">Response Size Categories</div>
              <canvas ref={sizeRef} height="120" />
            </div>
          </div>
        </div>
      );
    };

    const Insights = ({ latest }) => {
      if (!latest.insights || latest.insights.length === 0) return null;

      const icons = { security: '🔒', performance: '⚡', traffic: '📊', anomaly: '⚠️' };
      const iclasses = { security: 'bg-red-50 border-red-100', performance: 'bg-green-50 border-green-100', traffic: 'bg-blue-50 border-blue-100', anomaly: 'bg-amber-50 border-amber-100' };
      const sevClasses = { high: 'bg-red-100 text-red-700', medium: 'bg-amber-100 text-amber-700', low: 'bg-green-100 text-green-700' };

      return (
        <div className="mb-7">
          <div className="flex items-center gap-3 mb-4">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest">AI-Powered Insights</div>
            <div className="flex-1 h-px bg-slate-200" />
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {latest.insights.map((ins, i) => {
              const type = ins.type || 'performance';
              return (
                <div key={i} className="bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow hover:border-slate-300 transition p-5 flex gap-4">
                  <div className={`w-10 h-10 rounded-lg flex items-center justify-center text-xl flex-shrink-0 border ${iclasses[type]}`}>
                    {icons[type]}
                  </div>
                  <div className="flex-1">
                    <div className="flex flex-wrap items-center gap-2 mb-2">
                      <div className="text-base font-semibold">{ins.title || 'Insight'}</div>
                      <span className={`text-xs font-semibold px-2.5 py-1 rounded-full uppercase tracking-wide ${sevClasses[ins.severity || 'low']}`}>{ins.severity || 'low'}</span>
                      <span className="text-xs font-medium px-2.5 py-1 rounded-full bg-slate-100 text-slate-600">{type}</span>
                    </div>
                    <div className="text-sm text-slate-600 leading-relaxed">{ins.detail || ''}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const HistoryTable = ({ results, showHistory }) => {
      if (!showHistory) return null;

      const handleExport = (id, type) => {
        window.open(`${API_BASE}/api/export/${type}/${id}`, '_blank');
      };

      return (
        <div>
          <div className="flex items-center gap-3 mb-4">
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest">Analysis History</div>
            <div className="flex-1 h-px bg-slate-200" />
          </div>
          <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-widest">All Records</div>
              <div className="text-sm text-slate-500">{results.length} entries</div>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="border-b border-slate-100">
                    <th className="text-left text-xs font-semibold text-slate-500 uppercase tracking-widest px-5 py-3 whitespace-nowrap">Filename</th>
                    <th className="text-left text-xs font-semibold text-slate-500 uppercase tracking-widest px-5 py-3 whitespace-nowrap">HTTP Errors</th>
                    <th className="text-left text-xs font-semibold text-slate-500 uppercase tracking-widest px-5 py-3 whitespace-nowrap">Peak Hour</th>
                    <th className="text-left text-xs font-semibold text-slate-500 uppercase tracking-widest px-5 py-3 whitespace-nowrap">Lines</th>
                    <th className="text-left text-xs font-semibold text-slate-500 uppercase tracking-widest px-5 py-3 whitespace-nowrap">Speed</th>
                    <th className="text-left text-xs font-semibold text-slate-500 uppercase tracking-widest px-5 py-3 whitespace-nowrap">Uploaded By</th>
                    <th className="text-left text-xs font-semibold text-slate-500 uppercase tracking-widest px-5 py-3 whitespace-nowrap">Timestamp</th>
                    <th className="text-left text-xs font-semibold text-slate-500 uppercase tracking-widest px-5 py-3 whitespace-nowrap">Export</th>
                  </tr>
                </thead>
                <tbody>
                  {results.map((row) => {
                    const r = row.result || {};
                    const b = row.benchmarks || {};
                    const hours = Object.entries(r).filter(([k]) => k.startsWith('Hour_'));
                    const topHour = hours.length > 0 ? hours.sort((a, b) => b[1] - a[1])[0] : null;

                    return (
                      <tr key={row.id} className="border-b border-slate-50 hover:bg-slate-50 transition">
                        <td className="px-5 py-4 font-mono text-sm font-medium text-blue-600">{row.filename}</td>
                        <td className="px-5 py-4">
                          {Object.entries(r).filter(([k]) => k.startsWith('HTTP_') && (k[5] === '4' || k[5] === '5')).length > 0 ? (
                            Object.entries(r).filter(([k]) => k.startsWith('HTTP_') && (k[5] === '4' || k[5] === '5')).map(([k, v]) => (
                              <span key={k} className="inline-flex items-center text-xs font-medium bg-red-50 text-red-700 border border-red-100 px-2.5 py-1 rounded-full mr-2 mb-1">
                                {k}: {v}
                              </span>
                            ))
                          ) : (
                            <span className="text-sm text-slate-500">—</span>
                          )}
                        </td>
                        <td className="px-5 py-4">
                          {topHour ? (
                            <span className="inline-flex items-center text-xs font-medium bg-blue-50 text-blue-700 border border-blue-100 px-2.5 py-1 rounded-full">
                              {topHour[0].replace('Hour_', '')}:00 ({topHour[1]})
                            </span>
                          ) : (
                            <span className="text-sm text-slate-500">—</span>
                          )}
                        </td>
                        <td className="px-5 py-4 font-mono text-sm">{(b.total_lines || 0).toLocaleString()}</td>
                        <td className="px-5 py-4 font-mono text-sm font-medium text-blue-600">{(b.lines_per_sec || 0).toLocaleString()}/s</td>
                        <td className="px-5 py-4 text-sm text-slate-600">{row.uploaded_by}</td>
                        <td className="px-5 py-4 font-mono text-xs text-slate-500">
                          {row.created_at ? new Date(row.created_at).toLocaleString() : '—'}
                        </td>
                        <td className="px-5 py-4">
                          <div className="flex gap-2">
                            <button onClick={() => handleExport(row.id, 'csv')} className="text-xs font-semibold uppercase tracking-wide px-3 py-1.5 rounded-lg bg-green-50 text-green-700 border border-green-100 hover:bg-green-600 hover:text-white hover:border-green-600 transition">CSV</button>
                            <button onClick={() => handleExport(row.id, 'pdf')} className="text-xs font-semibold uppercase tracking-wide px-3 py-1.5 rounded-lg bg-blue-50 text-blue-700 border border-blue-100 hover:bg-blue-600 hover:text-white hover:border-blue-600 transition">PDF</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const Dashboard = ({ user, onLogout, goToUpload }) => {
      const [results, setResults] = useState([]);
      const [showHistory, setShowHistory] = useState(false);

      useEffect(() => {
        fetch(`${API_BASE}/api/results`)
          .then(res => res.json())
          .then(data => setResults(data))
          .catch(() => setResults([]));
      }, []);

      const latest = results.length > 0 ? results[0] : null;

      return (
        <div className="min-h-screen">
          <Nav user={user} onLogout={onLogout} />
          <main className="max-w-6xl mx-auto px-6 py-8">
            <div className="flex flex-wrap items-end justify-between gap-4 mb-7">
              <div>
                <h1 className="text-2xl font-bold mb-1">System Overview</h1>
                <p className="text-slate-500">Analytics dashboard for your log analysis</p>
              </div>
              <div className="flex items-center gap-3">
                <div className="flex items-center gap-2 text-sm font-medium text-green-600">
                  <span className="w-2 h-2 rounded-full bg-green-600 animate-pulse" />
                  LIVE
                </div>
                <button onClick={goToUpload} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition active:scale-[0.98]">+ Upload Log</button>
                <button onClick={() => setShowHistory(!showHistory)} className={`px-4 py-2 text-sm font-semibold rounded-lg transition ${showHistory ? 'bg-slate-900 text-white' : 'bg-white text-slate-700 border border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}>
                  {showHistory ? 'Hide History' : 'History'}
                </button>
              </div>
            </div>

            <StatsCards results={results} />

            {latest && (
              <>
                <Benchmarks latest={latest} />
                <SpeedCard latest={latest} />
                <Charts latest={latest} />
                <Insights latest={latest} />
              </>
            )}

            {!latest && (
              <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-12 text-center">
                <p className="text-slate-600 mb-4">No log files analyzed yet.</p>
                <button onClick={goToUpload} className="text-blue-600 font-semibold hover:underline">Upload your first .log file →</button>
              </div>
            )}

            <HistoryTable results={results} showHistory={showHistory} />
          </main>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [page, setPage] = useState('login');

      const handleLogin = (username) => {
        setUser(username);
        setPage('dashboard');
      };

      const handleLogout = () => {
        setUser(null);
        setPage('login');
        window.location.href = '/logout';
      };

      if (page === 'login' || !user) {
        return <Login onLogin={handleLogin} />;
      }

      if (page === 'upload') {
        return <Upload user={user} onBack={() => setPage('dashboard')} />;
      }

      return <Dashboard user={user} onLogout={handleLogout} goToUpload={() => setPage('upload')} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
{% endraw %}
  </script>
</body>
</html>
